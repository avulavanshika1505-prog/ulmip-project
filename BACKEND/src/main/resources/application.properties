# ============================================================
# ULMIP Backend - Application Configuration
# ============================================================

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Application name
spring.application.name=ulmip-backend

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ulmip_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=ULMIPSecretKey2024VeryLongAndSecureBase64EncodedStringForJWTTokenGeneration==
app.jwt.expiration=86400000
# 86400000 ms = 24 hours

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ============================================================
# Logging
# ============================================================
logging.level.com.ulmip=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration