# =============================================
# ULMIP Backend — application.properties
# Set DB_URL, DB_USERNAME, DB_PASSWORD in Render Environment Variables
# =============================================

# Server — Render injects PORT automatically
server.port=${PORT:8080}

# ── Database ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ulmip_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (keep small for free tier)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Use the correct non-deprecated dialect for Hibernate 6 / Spring Boot 3
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Jackson ───────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── Logging ───────────────────────────────────
logging.level.com.ulmip=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
